name: Network Automation Pipeline
on:
  push:
    branches: [main]
    paths:
      - 'ansible-cml/playbooks/**.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'ansible-cml/playbooks/**.yaml'
env:
  ANSIBLE_HOST_KEY_CHECKING: "False"
jobs:
  pre_check:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: | 
          pip install pyats genie ansible --quiet 
          ansible-galaxy collection install cisco.ios
      - name: Run pre-check snapshot
        run: python tests/pre_check.py
      - name: Upload pre-snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pre-snapshot
          path: pre_snapshot.json
  deploy:
    runs-on: self-hosted
    needs: pre_check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Install dependencies
        run: |
          pip install ansible --quiet 
          ansible-galaxy collection install cisco.ios
      - name: Detect changed playbook
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.yaml' | head -n 1)
          echo "playbook=$CHANGED" >> $GITHUB_OUTPUT
      - name: Deploy changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            ansible-playbook ${{ steps.changed.outputs.playbook }} -i inventory/digital-twin/hosts.yaml
          else
            ansible-playbook ${{ steps.changed.outputs.playbook }} -i inventory/prod/hosts.yaml
          fi
  post_check:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install pyats genie --quiet
      - name: Download pre-snapshot artifact
        uses: actions/download-artifact@v4
        with:
          name: pre-snapshot
      - name: Run post-check validation
        run: python tests/post_check.py