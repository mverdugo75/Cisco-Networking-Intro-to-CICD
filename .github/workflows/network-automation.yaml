name: Network Automation Pipeline
on:
  push:
    branches: [main]
    paths:
      - 'ansible-cml/playbooks/**.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'ansible-cml/playbooks/**.yaml'
env:
  ANSIBLE_HOST_KEY_CHECKING: "False"
jobs:
  pre_check:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: wsl bash -c "pip install pyats genie ansible cisco.ios --quiet"
      - name: Run pre-check snapshot
        run: wsl bash -c "cd $(wsl wslpath '${{ github.workspace }}') && python tests/pre_check.py"
      - name: Upload pre-snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pre-snapshot
          path: pre_snapshot.json
  deploy:
    runs-on: self-hosted
    needs: pre_check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Needed to diff against the previous commit
      - name: Install dependencies
        run: wsl bash -c "pip install ansible cisco.ios --quiet"
      - name: Detect changed playbook
        id: changed
        run: |
          $CHANGED = wsl bash -c "cd $(wsl wslpath '${{ github.workspace }}') && git diff --name-only HEAD~1 HEAD -- '*.yaml' | head -n 1"
          echo "playbook=$CHANGED" >> $env:GITHUB_OUTPUT
      - name: Deploy changes
        run: |
          $WSL_WORKSPACE = wsl wslpath '${{ github.workspace }}'
          if ("${{ github.event_name }}" -eq "pull_request") {
            wsl bash -c "cd $WSL_WORKSPACE && ansible-playbook ${{ steps.changed.outputs.playbook }} -i inventory/digital-twin/hosts.yaml"
          } else {
            wsl bash -c "cd $WSL_WORKSPACE && ansible-playbook ${{ steps.changed.outputs.playbook }} -i inventory/prod/hosts.yaml"
          }
  post_check:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: wsl bash -c "pip install pyats genie --quiet"
      - name: Download pre-snapshot artifact
        uses: actions/download-artifact@v4
        with:
          name: pre-snapshot
      - name: Run post-check validation
        run: |
          $WSL_WORKSPACE = wsl wslpath '${{ github.workspace }}'
          wsl bash -c "cd $WSL_WORKSPACE && python tests/post_check.py"