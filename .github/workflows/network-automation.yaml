name: Network Automation Pipeline
on:
  push:
    branches: [main]
    paths:
      - 'playbooks/**.yaml'
      - 'playbooks/**.yml'
  pull_request:
    branches: [main]
    paths:
      - 'playbooks/**.yaml'
      - 'playbooks/**.yml'
env:
  ANSIBLE_HOST_KEY_CHECKING: "False"
jobs:
  pre_check:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: | 
          pip install pyats genie ansible --quiet 
          ansible-galaxy collection install cisco.ios
      - name: Run pre-check snapshot
        run: python $GITHUB_WORKSPACE/tests/pre_check.py
      - name: Upload pre-snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pre-snapshot
          path: pre_snapshot.json
  deploy:
    runs-on: self-hosted
    needs: pre_check
    steps:
      - name: Detect changed playbook
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.yaml' '*.yml' | head -n 1)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.yaml' '*.yml' | head -n 1)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No changed playbook detected, skipping deploy."
            echo "playbook=" >> $GITHUB_OUTPUT
          else
            echo "playbook=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Deploy changes
        if: steps.changed.outputs.playbook != ''
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            ansible-playbook ${{ steps.changed.outputs.playbook }} -i inventory/digital-twin/hosts.yaml
          else
            ansible-playbook ${{ steps.changed.outputs.playbook }} -i inventory/prod/hosts.yaml
          fi
  post_check:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install pyats genie --quiet
      - name: Download pre-snapshot artifact
        uses: actions/download-artifact@v4
        with:
          name: pre-snapshot
      - name: Run post-check validation
        run: python $GITHUB_WORKSPACE/tests/post_check.py
