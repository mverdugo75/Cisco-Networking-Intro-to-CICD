name: Network Automation Pipeline
on:
  push:
    branches: [main]
    paths:
      - 'playbooks/**.yaml'
      - 'playbooks/**.yml'
  pull_request:
    branches: [main]
    paths:
      - 'playbooks/**.yaml'
      - 'playbooks/**.yml'
env:
  ANSIBLE_HOST_KEY_CHECKING: "False"
jobs:
  pre_check:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: | 
          pip install pyats genie ansible --quiet 
          ansible-galaxy collection install cisco.ios
      - name: Run pre-check snapshot
        run: python $GITHUB_WORKSPACE/tests/pre_check.py
      - name: Upload pre-snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pre-snapshot
          path: pre_snapshot.json
  deploy:
    runs-on: self-hosted
    needs: pre_check
    steps:
      - name: Fetch base branch
        run: git fetch origin main --depth=50

      - name: Detect changed playbook
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            playbooks/**.yml
            playbooks/**.yaml

      - name: Deploy changes
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            ansible-playbook ${{ steps.changed.outputs.all_changed_files }} -i inventory/digital-twin/hosts.yaml
          else
            ansible-playbook ${{ steps.changed.outputs.all_changed_files }} -i inventory/prod/hosts.yaml
          fi
  post_check:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install pyats genie --quiet
      - name: Download pre-snapshot artifact
        uses: actions/download-artifact@v4
        with:
          name: pre-snapshot
      - name: Run post-check validation
        run: python $GITHUB_WORKSPACE/tests/post_check.py
