# Platform-stability gates for CI pre/post checks (edit for your lab topology).
#
# management_vrf: VRF for SSH/management — ping and show ip route checks use this VRF.
#
# ping_targets: addresses every device must reach with 100% success (before and after deploy).
#   Use a stable next-hop, loopback, or management default route — not a host that Ansible changes.
#
# required_route_prefixes: optional RIB checks (show ip route vrf <management_vrf> <prefix>).
#   Leave empty for pure L2 switches or if only ICMP reachability matters.

management_vrf: Mgmt-vrf

ping_targets:
  - 8.8.8.8

required_route_prefixes: [0.0.0.0]

thresholds:
  # Fail post-check if five-second CPU is above this (instant overload).
  cpu_five_seconds_max_pct: 90
  # Fail if five-second CPU rises this many percentage points vs pre-deploy sample.
  cpu_five_seconds_increase_max_pct: 35
  # Fail if processor memory "used %" rises more than this many points vs pre-deploy.
  memory_used_pct_increase_max: 15
